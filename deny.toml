## cargo-deny configuration for subsume
#
# Run: cargo deny check

[advisories]
ignore = [
    # bincode: unmaintained, transitive via burn. No replacement available.
    "RUSTSEC-2025-0141",
    # paste: unmaintained, transitive via burn/tranz dev paths. No replacement
    # available from this crate until those upstreams remove it.
    "RUSTSEC-2024-0436",
]

[licenses]
# Zlib: foldhash (transitive via burn->hashbrown).
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "Unicode-3.0", "Unlicense", "Zlib"]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
