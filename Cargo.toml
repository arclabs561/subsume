[package]
name = "subsume"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
authors = ["Arc <attobop@gmail.com>"]
description = "Geometric box embeddings: containment, entailment, overlap. Ndarray and Candle backends."
keywords = ["embeddings", "box-embeddings", "geometric", "containment", "entailment"]
categories = ["science", "algorithms"]
repository = "https://github.com/arclabs561/subsume"
documentation = "https://docs.rs/subsume"
readme = "README.md"
publish = true

[dependencies]
serde = { version = "1", features = ["derive"] }
thiserror = "2"
rand = { version = "0.9", optional = true }
hyperball = { version = "0.1.0", path = "../hyperball" }
skel = { version = "0.1.0", path = "../skel" }
ndarray = { version = "0.16", features = ["serde-1"], optional = true }
serde_json = { version = "1.0", optional = true }
candle-core = { version = "0.9", optional = true }

[features]
default = ["ndarray-backend"]
ndarray-backend = ["dep:ndarray", "dep:serde_json", "rand"]
candle-backend = ["dep:candle-core"]
rand = ["dep:rand"]
plotting = []

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.5"
tempfile = "3"

[lints.rust]
missing_docs = "warn"
unsafe_code = "warn"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--html-in-header", "docs/katex-header.html"]

[lints.clippy]
correctness = { level = "deny", priority = -1 }
perf = { level = "warn", priority = -1 }
