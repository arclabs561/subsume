name: Publish Rust (subsume)

on:
  push:
    tags: ['v*', '!py-v*']

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "stable"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Test (non-CUDA features)
        run: cargo test --features "ndarray-backend,rand,sheaf,rankops,petgraph"

      - name: Check Burn example metadata
        run: |
          for features in "burn-wgpu,kge" "burn-backend,kge"; do
            for ex in el_benchmark_burn el_clqa_trained el_clqa_benchmark \
                      el_clqa_galen taxobell_box_uncertainty taxobell_precinct \
                      wn18rr_ball_burn wn18rr_box_burn wn18rr_cone_burn \
                      wn18rr_geometry_comparison_burn wn18rr_transbox_burn; do
              cargo check --no-default-features --features "$features" --example "$ex"
            done
          done

  publish:
    name: Publish to crates.io
    needs: [test]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "stable"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Authenticate (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Dry run
        run: cargo publish --dry-run

      # Re-running the workflow after a successful publish must not fail on
      # "crate version already exists" (cargo has no --idempotent yet:
      # rust-lang/cargo#13397).
      - name: Check if version already published
        id: published
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          count=$(curl -sf https://index.crates.io/su/bs/subsume | jq -r '.vers' | grep -Fxc "$version" || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Publish
        if: steps.published.outputs.count == '0'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
