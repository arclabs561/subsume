name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features "ndarray-backend,candle-backend,rand,sheaf,rankops,petgraph" --lib --tests --examples -- -Dwarnings

      - name: Build
        run: cargo build --features "ndarray-backend,candle-backend,rand,sheaf,rankops,petgraph"

      - name: Test
        run: cargo test --features "ndarray-backend,candle-backend,rand,sheaf,rankops,petgraph"

      - name: Doc
        run: cargo doc --features "ndarray-backend,candle-backend,rand,sheaf,rankops,petgraph,lattix,spherical,density,hyperbolic" --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6

      - name: Build and install
        working-directory: subsume-python
        run: uv sync

      - name: Smoke test
        working-directory: subsume-python
        run: |
          uv run python -c "
          import subsumer
          print('version:', subsumer.__version__)
          box = subsumer.BoxEmbedding([0.0, 0.0], [1.0, 1.0], 1.0)
          print(repr(box))
          triples = [('animal', 'hypernym', 'dog'), ('animal', 'hypernym', 'cat')]
          t, ids = subsumer.BoxEmbeddingTrainer.from_triples(triples)
          r = t.fit(ids)
          print(f'MRR: {r[\"mrr\"]:.3f}')
          t2, ids2 = subsumer.ConeEmbeddingTrainer.from_triples(triples)
          r2 = t2.fit(ids2)
          print(f'Cone MRR: {r2[\"mrr\"]:.3f}')
          # Candle trainers
          assert hasattr(subsumer, 'CandleBoxTrainer'), 'CandleBoxTrainer missing'
          assert hasattr(subsumer, 'CandleElTrainer'), 'CandleElTrainer missing'
          assert hasattr(subsumer, 'CandleConeTrainer'), 'CandleConeTrainer missing'
          ct = subsumer.CandleConeTrainer(num_entities=10, dim=4)
          print(repr(ct))
          cb = subsumer.CandleBoxTrainer(num_entities=10, num_relations=1, dim=4)
          print(repr(cb))
          print('OK')
          "

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2

      # Note: candle/criterion deps require Rust 1.80+ (rayon 1.11)
      # MSRV check only tests core functionality without ML backends
      - name: Check MSRV
        run: |
          rm -f Cargo.lock  # v4 lock file requires Cargo 1.83+
          cargo check -p subsume

  # Dependency linting (licenses, advisories, bans, sources)
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  semver:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks

      - name: Check semver
        run: cargo semver-checks check-release --only-explicit-features --features "ndarray-backend,candle-backend,rand,sheaf,rankops,petgraph"
