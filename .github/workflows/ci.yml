name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features "ndarray-backend,rand,sheaf,rankops,petgraph,kge,spherical,density" --lib --tests --examples -- -Dwarnings
      - name: bare build (no default features)
        run: cargo check --no-default-features

      - name: Build
        run: cargo build --features "ndarray-backend,rand,sheaf,rankops,petgraph"

      - name: Test
        run: cargo test --features "ndarray-backend,rand,sheaf,rankops,petgraph,kge,density"

      - name: Doc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --all-features --no-deps

      - name: Test (burn trainers)
        # The burn trainers' synthetic-MRR guards are cfg-gated on
        # burn-ndarray/burn-wgpu + kge. No other step enables a burn feature,
        # so without this step those guards compile out of CI entirely and a
        # loss-sign or formula regression would land silently (the exact bug
        # class the synthetic-MRR convention exists to catch). All burn test
        # modules are burn_-prefixed; the filter keeps the step at ~45 tests.
        run: cargo test --features "burn-ndarray,kge" burn_

      - name: Check WGPU burn examples
        # GitHub's runner is not a reliable GPU runtime, but this makes the
        # burn-wgpu feature surface compile and verifies that dual-backend
        # examples select WGPU when that feature is enabled.
        run: |
          for ex in el_benchmark_burn el_clqa_trained el_clqa_benchmark \
                    el_clqa_galen taxobell_box_uncertainty taxobell_precinct \
                    wn18rr_ball_burn wn18rr_box_burn wn18rr_cone_burn \
                    wn18rr_geometry_comparison_burn wn18rr_transbox_burn; do
            cargo check --no-default-features --features "burn-wgpu,kge" --example "$ex"
          done

      - name: Check Burn backend example metadata
        # `required-features` has no OR semantics, so dual-backend examples use
        # burn-ndarray as their Cargo-visible CPU fallback. Keep the shared
        # burn-backend gate compiling too.
        run: |
          for ex in el_benchmark_burn el_clqa_trained el_clqa_benchmark \
                    el_clqa_galen taxobell_box_uncertainty taxobell_precinct \
                    wn18rr_ball_burn wn18rr_box_burn wn18rr_cone_burn \
                    wn18rr_geometry_comparison_burn wn18rr_transbox_burn; do
            cargo check --no-default-features --features "burn-backend,kge" --example "$ex"
          done

      - name: Test GALEN learned diagnostics
        run: cargo test --features burn-ndarray --example el_clqa_galen

      - name: run example assertions
        run: |
          FEATS="ndarray-backend,rand,kge,petgraph,density"
          for ex in density_el_demo query2box octagon_demo containment_hierarchy \
                    taxobell_demo gumbel_box_exploration gene_ontology \
                    petgraph_adapter lattix_bridge; do
            cargo run --example "$ex" --features "$FEATS"
          done
        env:
          RUSTDOCFLAGS: -Dwarnings

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6

      - name: Build and install
        working-directory: subsume-python
        run: uv sync

      - name: Smoke test
        working-directory: subsume-python
        run: |
          uv run python -c "
          import subsumer
          print('version:', subsumer.__version__)
          box = subsumer.BoxEmbedding([0.0, 0.0], [1.0, 1.0], 1.0)
          print(repr(box))
          triples = [('animal', 'hypernym', 'dog'), ('animal', 'hypernym', 'cat')]
          t, ids = subsumer.BoxEmbeddingTrainer.from_triples(triples)
          r = t.fit(ids)
          print(f'MRR: {r[\"mrr\"]:.3f}')
          t2, ids2 = subsumer.ConeEmbeddingTrainer.from_triples(triples)
          r2 = t2.fit(ids2)
          print(f'Cone MRR: {r2[\"mrr\"]:.3f}')
          print('OK')
          "

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2

      # Note: criterion + ML-backend deps require a newer toolchain than MSRV
      # MSRV check only tests core functionality without ML backends
      - name: Check MSRV
        run: |
          rm -f Cargo.lock  # v4 lock file requires Cargo 1.83+
          cargo check -p subsume

  # Dependency linting (licenses, advisories, bans, sources)
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    continue-on-error: true  # core2 0.4.0 yanked (burn -> rav1e transitive)
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  semver:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks

      - name: Check semver
        run: cargo semver-checks check-release --only-explicit-features --features "ndarray-backend,rand,sheaf,rankops,petgraph,kge"
